name: Release

# Triggered when you push a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# Can also be triggered manually from the Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ── macOS build ────────────────────────────────────────────────────────────
  build-mac:
    name: Package (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build & package
        # --publish never: let this job only produce the file; the release job uploads it
        run: npm run package:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error

  # ── Windows build ──────────────────────────────────────────────────────────
  build-win:
    name: Package (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build & package
        run: npm run package:win -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe
          if-no-files-found: error

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/win

      - name: Create Release (empty first)
        run: |
          TAG="${{ github.ref_name }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "Release $TAG" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Upload macOS DMG
        run: gh release upload "${{ github.ref_name }}" dist/mac/*.dmg --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Upload Windows installer
        run: gh release upload "${{ github.ref_name }}" dist/win/*.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
